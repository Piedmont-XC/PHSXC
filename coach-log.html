<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>PHSXC Coach Runner Log</title><meta name="theme-color" content="#5b2a86"/><link rel="stylesheet" href="styles.css?v=30"/></head><body><main class="app"><header class="hero"><div><p class="eyebrow">PHSXC Coach View</p><h1 id="coachLogTitle">Runner Workout Log</h1><p class="date-label">Coach-only view of submitted workout logs.</p></div></header><section class="card"><a class="back-link" href="leaderboard.html">← Back to Summer Team Board</a></section><section class="card"><h2>Choose Week</h2><div class="week-nav-card"><p class="label">Week Navigator</p><div class="week-nav-buttons"><button id="prevWeekBtn" type="button" class="secondary-action">← Previous Week</button><button id="thisWeekBtn" type="button" class="submit-btn">This Week</button><button id="nextWeekBtn" type="button" class="secondary-action">Next Week →</button></div></div><label class="field"><span>Selected Date</span><input id="selectedDate" type="date"/><p class="help-text">The weekly total is Monday–Sunday for the week containing this date.</p></label><button id="refreshCoachLogBtn" class="submit-btn" type="button">Refresh Runner Log</button><p id="coachLogStatus" class="form-status" role="status"></p></section><section id="coachLogResults" class="card confirmation-card" hidden><h2 id="resultsTitle">Workout Log</h2><p id="resultsSubtitle" class="confirmation-message"></p><div class="summary-grid"><div class="summary-box"><p class="summary-label">Day Total</p><p id="daySummary" class="summary-value"></p></div><div class="summary-box"><p class="summary-label">Weekly Total</p><p id="weekSummary" class="summary-value"></p></div><div class="summary-box"><p class="summary-label">Summer Total</p><p id="summerSummary" class="summary-value"></p></div></div><div class="summary-box strength-summary-box"><p class="summary-label">Strength Summary</p><p id="strengthSummary" class="summary-value"></p></div><h3 id="entriesHeading">Entries This Week</h3><div id="entriesList" class="entries-list"></div></section><section class="card bottom-back-card"><a class="back-link bottom-back-link" href="index.html">← Back to today’s workout</a></section></main><script src="coach-log.js?v=30"></script></body></html>
